<!-- Relocate (not duplicate) the page breadcrumb into the navbar brand container.
     On narrow screens its d-none class hides it and the secondary-nav breadcrumb takes over. -->
<script>
(function () {
  function moveBreadcrumb() {
    var brand = document.querySelector("#quarto-header .navbar-brand-container");
    var crumbs = document.querySelector("#title-block-header nav.quarto-title-breadcrumbs");
    if (brand && crumbs && !brand.contains(crumbs)) {
      crumbs.classList.add("ssm-navbar-breadcrumbs");
      brand.appendChild(crumbs);
    }
  }
  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", moveBreadcrumb);
  } else {
    moveBreadcrumb();
  }
})();
</script>
