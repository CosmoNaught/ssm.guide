bibliography: references.bib

# Rename Pandoc's auto footnotes block from "Footnotes" to "Footnotes and references".
language:
  section-title-footnotes: "Footnotes and references"

jupyter: python3

execute:
  freeze: auto

format:
  html:
    theme:
      light: [cosmo, styles/light.scss, styles/theme.scss]
      dark: [cosmo, styles/dark.scss, styles/theme.scss]
    html-math-method: mathjax
    include-in-header: _mathjax-config.html
    include-after-body:
      - _navbar-breadcrumb.html
      - _prevnext-fix.html
    link-citations: true
    citations-hover: false
    toc: true
    toc-depth: 3
    toc-title: "Table of Contents"
    number-sections: false
    grid:
      sidebar-width: 340px
