project:
  type: website
  output-dir: _book
  execute-dir: project
  # Explicit render list: keeps everything else in the working tree out of the output.
  render:
    - index.qmd
    - chapters/
  resources:
    - cover/front_cover.png
    - cover/front_cover_web.png
    - misc/cosmo.jpeg
    - misc/icon-blue.svg
    - misc/icon-orange.svg
    - CNAME

website:
  title: "State Space Models"
  favicon: misc/icon-blue.svg
  search: false
  page-navigation: true
  page-footer:
    border: false
    center: |
      &copy;&nbsp;2026 Cosmo Santoni. Text under [CC&nbsp;BY&nbsp;4.0](https://creativecommons.org/licenses/by/4.0/); code under [Apache&nbsp;2.0](https://www.apache.org/licenses/LICENSE-2.0).
  navbar:
    background: "#e37c47"
    foreground: "#ffffff"
    title: "State Space Models"
    pinned: true
    search: false
    right:
      - icon: github
        href: "https://github.com/CosmoNaught/ssm.guide"
        aria-label: GitHub
  sidebar:
