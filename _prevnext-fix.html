<!--
  Rebuild the bottom prev/next nav so it steps page-to-page.

  Quarto builds prev/next by stepping through every sidebar entry, including
  per-subsection anchors (...#sec-2-1-1), so "next" lands on a page's own first
  subsection (2.1 -> 2.1.1) rather than the next page (2.1 -> 2.2). Fold
  same-page subsection anchors into their page before computing prev/next.
-->
<script>
(function () {
  function normPath(p) {
    return p.replace(/index\.html$/, "").replace(/\/$/, "");
  }

  function fixPrevNext() {
    var menu = document.querySelector("#quarto-sidebar .sidebar-menu-container");
    var nav = document.querySelector(".page-navigation");
    if (!menu || !nav) return;

    // Ordered, de-duplicated list of pages, anchors folded into their page.
    var pages = [];
    var anchors = menu.querySelectorAll("a.sidebar-link");
    for (var n = 0; n < anchors.length; n++) {
      var a = anchors[n];
      if (!a.getAttribute("href")) continue;
      var path = normPath(a.pathname);
      var hasHash = !!a.hash;
      var last = pages.length ? pages[pages.length - 1] : null;
      if (!last || last.path !== path) {
        pages.push({
          path: path,
          href: a.href.split("#")[0],
          title: a.textContent.trim(),
          titled: !hasHash
        });
      } else if (!hasHash && !last.titled) {
        // a no-fragment link to the same page carries the page's own title
        last.href = a.href.split("#")[0];
        last.title = a.textContent.trim();
        last.titled = true;
      }
    }

    var here = normPath(location.pathname);
    var i = -1;
    for (var k = 0; k < pages.length; k++) {
      if (pages[k].path === here) { i = k; break; }
    }
    if (i === -1) return;

    function setSide(selector, page) {
      var box = nav.querySelector(selector);
      if (!box) return;
      var link = box.querySelector("a");
      if (!link) return;
      if (!page) { box.style.display = "none"; return; }
      link.setAttribute("href", page.href);
      var text = link.querySelector(".nav-page-text");
      if (text) text.textContent = page.title;
    }

    setSide(".nav-page-previous", i > 0 ? pages[i - 1] : null);
    setSide(".nav-page-next", i < pages.length - 1 ? pages[i + 1] : null);
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", fixPrevNext);
  } else {
    fixPrevNext();
  }
})();
</script>
